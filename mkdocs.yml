# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: Kinther's Blog
site_description: kinther's blog
site_url: https://kinthero.github.io/blog
copyright: Copyright &copy; 2025 kinther

# Repository
repo_name: kinthero/blog
repo_url: https://github.com/kinthero/blog

theme:
  name: material
  custom_dir: overrides
  icon:
    logo: simple/known
  palette: 
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
      primary: teal
      accent: red
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
      primary: white
      accent: red
  font:
    text: LXGW WenKai TC
    code: Fira Code
  
markdown_extensions:
  - abbr
  - attr_list
  # emoji
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # code highlight
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  # admonition
  - admonition
  - pymdownx.details
  # diagrams
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  social:
    - icon: simple/github
      link: https://kinthero.github.com
    - icon: simple/rss
      link: https://kinthero.github.io/blog/feed_rss_created.xml

plugins:
  - meta
  - search
  - blog:
      blog_dir: .
      authors: true
      blog_toc: true
      pagination_per_page: 5
      post_url_format: "{slug}"
      categories_allowed:
        - python
        - llm
        - math
        - misc
        - how-to
  - tags
  - rss:
      match_path: "posts/.*"
      pretty_print: true
      date_from_meta:
        as_creation: date.created
        as_update: date.updated
